# Fly.io app config - GitLab Handbook Chatbot (backend)
# Deploy: fly deploy
# Set secrets: fly secrets set BYTEZ_API_KEY=xxx LLM_PROVIDER=bytez

app = "gitlab-handbook-chatbot"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Optional: persist vector store across deploys (uncomment and run: fly volumes create vector_data)
# [[mounts]]
#   source = "vector_data"
#   destination = "/app/vector_store"
